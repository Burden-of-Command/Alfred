<text x="55" y="78" fill="#7b2638" font-family="Arial,sans-serif" font-size="18" font-weight="bold" letter-spacing="2">S07  SCENARIO / DIFFICULTY 3</text>
<text x="55" y="137" fill="#202522" font-family="Georgia,serif" font-size="42" font-weight="bold">The Long Pursuit</text>
<text x="55" y="215" fill="#7b2638" font-family="Arial,sans-serif" font-size="20" font-weight="bold" letter-spacing="3">894-896</text>
<text x="55" y="270" fill="#202522" font-family="Georgia,serif" font-size="27"><tspan x="55" dy="0">Finish with at most two fortified camps</tspan><tspan x="55" dy="34">and use both Delay and Blockade during</tspan><tspan x="55" dy="34">the Scenario.</tspan></text>
<text x="55" y="602" fill="#7b2638" font-family="Arial,sans-serif" font-size="20" font-weight="bold" letter-spacing="3">8 ROUNDS</text>
<text x="55" y="657" fill="#202522" font-family="Georgia,serif" font-size="19"><tspan x="55" dy="0">Start: Legitimacy 5, Obligation 5, Wealth 5, Reform</tspan><tspan x="55" dy="24">4. Harvest rounds: 3, 6. Readiness: DeR SoR DoD HaR</tspan><tspan x="55" dy="24">WiD BeD KeD ThD LoR MeR. Active Burhs: somerset,</tspan><tspan x="55" dy="24">hampshire, berkshire, london. Armies: Hæsten&#x27;s Host</tspan><tspan x="55" dy="24">4 at Wallingford, Thames Host 3 at English Mercia.</tspan><tspan x="55" dy="24">Objective: fortified camps at most 2; Obligation</tspan><tspan x="55" dy="24">2+.</tspan></text>
<text x="375" y="925" text-anchor="middle" fill="#7b2638" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2">SURVIVE THE WAR. LEAVE A KINGDOM ABLE TO ANSWER.</text>
