<text x="55" y="78" fill="#a24b36" font-family="Arial,sans-serif" font-size="18" font-weight="bold" letter-spacing="2">E16  CRISIS / GROUP H</text>
<text x="55" y="137" fill="#f0e8d5" font-family="Georgia,serif" font-size="42" font-weight="bold">The Long Pursuit</text>
<text x="55" y="215" fill="#a24b36" font-family="Arial,sans-serif" font-size="20" font-weight="bold" letter-spacing="3">ARRIVAL</text>
<text x="55" y="270" fill="#f0e8d5" font-family="Georgia,serif" font-size="27"><tspan x="55" dy="0">Lose 1 Obligation or return one fyrd to</tspan><tspan x="55" dy="34">its home reserve.</tspan></text>
<text x="55" y="602" fill="#a24b36" font-family="Arial,sans-serif" font-size="20" font-weight="bold" letter-spacing="3">HÆSTEN&#x27;S HOST: DRAW THE FYRD</text>
<text x="55" y="657" fill="#f0e8d5" font-family="Georgia,serif" font-size="27"><tspan x="55" dy="0">If no fortified camp remains, gain 1</tspan><tspan x="55" dy="34">Reform.</tspan></text>
<text x="375" y="925" text-anchor="middle" fill="#a24b36" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2">READ THE PURPOSE. CHOOSE WHAT MAY BE LEFT WEAK.</text>
