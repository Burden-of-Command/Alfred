<text x="55" y="137" fill="#202522" font-family="Georgia,serif" font-size="42" font-weight="bold">Ethandun (Edington)</text>
<text x="55" y="215" fill="#7b2638" font-family="Arial,sans-serif" font-size="20" font-weight="bold" letter-spacing="3">878</text>
<text x="55" y="270" fill="#202522" font-family="Georgia,serif" font-size="27"><tspan x="55" dy="0">Reduce Guthrum&#x27;s Host to Strength 3 or</tspan><tspan x="55" dy="34">less, then negotiate successfully without</tspan><tspan x="55" dy="34">Obligation falling below 2.</tspan></text>
<text x="55" y="602" fill="#7b2638" font-family="Arial,sans-serif" font-size="20" font-weight="bold" letter-spacing="3">5 ROUNDS</text>
<text x="55" y="657" fill="#202522" font-family="Georgia,serif" font-size="19"><tspan x="55" dy="0">Start: Legitimacy 4, Obligation 5, Wealth 3, Reform</tspan><tspan x="55" dy="24">0. Harvest rounds: 3. Readiness: DeD SoR DoD HaD</tspan><tspan x="55" dy="24">WiR BeD KeX ThX LoD MeD. Active Burhs: somerset.</tspan><tspan x="55" dy="24">Armies: Guthrum&#x27;s Host 4 at Wilton. Objective:</tspan><tspan x="55" dy="24">Guthrum Strength at most 3; successful negotiation.</tspan></text>
<text x="375" y="925" text-anchor="middle" fill="#7b2638" font-family="Arial,sans-serif" font-size="13" font-weight="bold" letter-spacing="2">SURVIVE THE WAR. LEAVE A KINGDOM ABLE TO ANSWER.</text>
