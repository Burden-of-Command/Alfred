<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">The Burden of Command Series Logo</title>
  <desc id="desc">A restrained historical strategy logo with a command map emblem and series wordmark.</desc>
  <defs>
