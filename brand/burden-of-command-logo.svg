    <circle cx="120" cy="120" r="72" fill="none" stroke="#a9853f" stroke-width="3" opacity=".8"/>
    <path d="M120 28V212M28 120H212M55 55L185 185M185 55L55 185" stroke="#a9853f" stroke-width="3" opacity=".65"/>
    <path d="M62 145C92 118 111 108 139 111C168 114 181 96 205 72" fill="none" stroke="#ead9a5" stroke-width="5" stroke-linecap="round"/>
